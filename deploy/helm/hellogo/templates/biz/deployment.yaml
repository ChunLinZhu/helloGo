apiVersion: apps/v1
kind: Deployment
metadata:
  name: biz-service
  namespace: {{ .Values.namespace }}
  labels:
    app: biz-service
spec:
  replicas: {{ .Values.services.biz.replicas }}
  selector:
    matchLabels:
      app: biz-service
  template:
    metadata:
      labels:
        app: biz-service
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql {{ .Values.mysql.port }}; do echo waiting for mysql; sleep 2; done']
      containers:
        - name: biz-service
          image: "{{ .Values.services.biz.image }}:{{ .Values.services.biz.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.services.biz.grpcPort }}
            - name: health
              containerPort: {{ .Values.services.biz.healthPort }}
          env:
            {{- include "hellogo.env" . | nindent 12 }}
            - name: GRPC_PORT
              value: "{{ .Values.services.biz.grpcPort }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: {{ .Values.services.biz.resources.requests.cpu }}
              memory: {{ .Values.services.biz.resources.requests.memory }}
            limits:
              cpu: {{ .Values.services.biz.resources.limits.cpu }}
              memory: {{ .Values.services.biz.resources.limits.memory }}
