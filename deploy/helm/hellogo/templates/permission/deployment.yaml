apiVersion: apps/v1
kind: Deployment
metadata:
  name: permission-service
  namespace: {{ .Values.namespace }}
  labels:
    app: permission-service
spec:
  replicas: {{ .Values.services.permission.replicas }}
  selector:
    matchLabels:
      app: permission-service
  template:
    metadata:
      labels:
        app: permission-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: permission-service
          image: "{{ .Values.services.permission.image }}:{{ .Values.services.permission.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.services.permission.grpcPort }}
            - name: health
              containerPort: {{ .Values.services.permission.healthPort }}
          env:
            {{- include "hellogo.env" . | nindent 12 }}
            - name: GRPC_PORT
              value: "{{ .Values.services.permission.grpcPort }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: {{ .Values.services.permission.resources.requests.cpu }}
              memory: {{ .Values.services.permission.resources.requests.memory }}
            limits:
              cpu: {{ .Values.services.permission.resources.limits.cpu }}
              memory: {{ .Values.services.permission.resources.limits.memory }}
