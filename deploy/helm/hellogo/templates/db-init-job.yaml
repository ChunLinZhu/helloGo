# Helm post-install hook: 等待 MySQL 就绪并创建数据库
# 各服务启动时会自动执行 AutoMigrate 建表
apiVersion: batch/v1
kind: Job
metadata:
  name: hellogo-db-init
  namespace: {{ .Values.namespace }}
  labels:
    app: db-init
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql {{ .Values.mysql.port }}; do echo waiting for mysql; sleep 3; done']
      containers:
        - name: create-db
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              echo "Creating database if not exists..."
              mysql -h mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "CREATE DATABASE IF NOT EXISTS {{ .Values.mysql.database }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
              echo "Database ready."
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hellogo-secrets
                  key: db-password
