apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: user-service
  ports:
    - name: grpc
      port: {{ .Values.services.user.grpcPort }}
      targetPort: grpc
    - name: health
      port: {{ .Values.services.user.healthPort }}
      targetPort: health
