apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
spec:
  replicas: {{ .Values.services.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: "{{ .Values.services.gateway.image }}:{{ .Values.services.gateway.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.gateway.httpPort }}
            - name: health
              containerPort: {{ .Values.services.gateway.healthPort }}
          env:
            {{- include "hellogo.env" . | nindent 12 }}
            - name: HTTP_PORT
              value: "{{ .Values.services.gateway.httpPort }}"
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: hellogo-config
                  key: CORS_ORIGINS
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: {{ .Values.services.gateway.resources.requests.cpu }}
              memory: {{ .Values.services.gateway.resources.requests.memory }}
            limits:
              cpu: {{ .Values.services.gateway.resources.limits.cpu }}
              memory: {{ .Values.services.gateway.resources.limits.memory }}
