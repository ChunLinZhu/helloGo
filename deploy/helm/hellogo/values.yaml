# ── 全局 ─────────────────────────────────────────────────────
namespace: hellogo
imagePullPolicy: IfNotPresent

# ── 数据库 ────────────────────────────────────────────────────
mysql:
  enabled: true
  image: mysql:8.0
  rootPassword: root123456
  database: hellogo
  storage: 5Gi
  port: 3306

# ── Redis ─────────────────────────────────────────────────────
redis:
  enabled: true
  image: redis:7-alpine
  password: ""
  storage: 1Gi
  port: 6379

# ── 共享配置 ──────────────────────────────────────────────────
config:
  appEnv: production
  dbType: mysql
  dbName: hellogo
  dbUser: root
  jwtSecret: k8s-jwt-secret-change-in-prod
  jwtExpires: 1d
  jwtRefreshExpires: 7d
  loginMaxFails: 5
  loginLockTTL: 600
  corsOrigins: "*"

# ── 微服务 ────────────────────────────────────────────────────
services:
  user:
    image: hellogo/user
    tag: latest
    replicas: 2
    grpcPort: 50001
    healthPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  auth:
    image: hellogo/auth
    tag: latest
    replicas: 2
    grpcPort: 50002
    healthPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  permission:
    image: hellogo/permission
    tag: latest
    replicas: 2
    grpcPort: 50003
    healthPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  biz:
    image: hellogo/biz
    tag: latest
    replicas: 2
    grpcPort: 50004
    healthPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  gateway:
    image: hellogo/gateway
    tag: latest
    replicas: 2
    httpPort: 8000
    healthPort: 8080
    nodePort: 30080
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

# ── 前端 ──────────────────────────────────────────────────────
frontend:
  image: hellogo/frontend
  tag: latest
  replicas: 1
  port: 80
  nodePort: 30090
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── 种子数据 ──────────────────────────────────────────────────
seed:
  tag: latest
