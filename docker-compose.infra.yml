# ============================================================
# helloGo docker-compose.infra — 仅基础设施（Redis + MySQL + PostgreSQL）
# ============================================================
# 用法:
#   make infra-up    — 启动基础设施（本地开发用）
#   make infra-down  — 停止基础设施
#   docker-compose -f docker-compose.infra.yml up -d
# ============================================================

version: '2.4'

services:
  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hellogo-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASS:-11111} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASS:-11111}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MySQL 8 ──────────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: hellogo-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS:-hellogo_password}
      - MYSQL_DATABASE=${DB_NAME:-hellogo}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PostgreSQL 15 ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hellogo-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=${PG_USER:-hellogo}
      - POSTGRES_PASSWORD=${PG_PASS:-hellogo_password}
      - POSTGRES_DB=${PG_DB:-hellogo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER:-hellogo}']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  mysql-data:
  postgres-data:
